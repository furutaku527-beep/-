name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/new-session-y65fxe
      - claude/kachikachi-kun-app-3xa2tb
  workflow_dispatch:

# GITHUB_TOKEN に Pages へのデプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に走らないようにする（新しいデプロイを優先）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            kachikachi/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # リポジトリ名からベースパスを組み立てる（例: /-/）
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Install kachikachi dependencies
        run: npm ci
        working-directory: kachikachi

      - name: Build kachikachi
        run: npm run build
        working-directory: kachikachi
        env:
          BASE_PATH: /${{ github.event.repository.name }}/kachikachi/

      # カチカチくんを /kachikachi/ 配下に同居させる
      - name: Merge kachikachi into dist
        run: |
          mkdir -p dist/kachikachi
          cp -r kachikachi/dist/. dist/kachikachi/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
